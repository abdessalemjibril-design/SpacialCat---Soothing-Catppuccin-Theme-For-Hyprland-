# ~/.config/hypr/hypridle.conf

[general]
# Grace period (seconds) to allow movement before triggering the first listener
grace = 5
# Prevent sleep until the screen is locked (crucial for security)
inhibit_sleep = true
# Command to run to lock the screen (optional, often used in listeners)
lock_cmd = pidof hyprlock || hyprlock

[listener]
# Lock screen after 5 minutes (300 seconds)
timeout = 300
on-timeout = loginctl lock-session

[listener]
# Turn off display after 10 minutes (600 seconds)
timeout = 600
on-timeout = hyprctl dispatch dpms off
on-resume = hyprctl dispatch dpms on

[listener]
# Suspend system after 15 minutes (900 seconds)
timeout = 900
on-timeout = systemctl suspend
